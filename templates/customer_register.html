{%include "head.html"%}
<script>
    function validate(){
        let password = document.getElementById("password").value
        let confirm_password = document.getElementById("confirm_password").value
        if(password!=confirm_password) {
            alert("Password Should Match With the Confirm Password")
            return false
        }
        return true
    }
</script>
<div class="container-fluid login">

<div class="row">
  <div class="col-md-4"></div>
    <div class="col-md-4"></div>
            <div class="col-md-4">
            <div class="card mt-3 p-4 display:block">
            <div class="text-center h4">Customer Registration</div>
                <form action="customer_register1" method="post" onsubmit="return validate()">
                        <div class="mt-1">
                            <label for="name">Name</label>
                            <input type="text"  name="name" id="name"  placeholder="Enter Name" class="form-control">
                        </div>
                         <div class="mt-1">
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email"  placeholder="Enter email" class="form-control">
                        </div>
                        <div class= "mt-2">
                            <label for="phone">Phone Number</label>
                            <input type="number" min="0" name="phone" id="phone"  placeholder="Enter Number" class="form-control">
                        </div>
                         <div class="mt-2">
                            <label for="dob">Date of Birth:</label>
                            <input type="date" min="1" name="dob" id="dob" placeholder="Enter Date of birth" class="form-control">
                        </div>
                       <div class="mt-1">
                            <label for="password">Password</label>
                            <input type="password" name="password" id="password" placeholder="Enter password" class="form-control">
                        </div>
                         <div class="col-md-6 mt-2">
                        <label>confirm password</label>
                        <input type="password" name="confirm_password" id ="confirm_password"  class="form-control" placeholder="Enter Confirm Password" required >
                    </div>


                      <div class="mt-1">
                              <label>Gender</label>
                              <input type="radio" name="gender" id="male" value="male"><label for="male">Male</label>
                              <input type="radio" name="gender" id="female" value="female"><label for="female">Female</label>

                          </div>
                         <div class="mt-1 row">
                                <div class="col-md-6 mt-2">
                                    <input type="submit" id="submit" value="Register" class="btn btn-primary w-100">
                              </div>
                              <div class="col-md-6 mt-2">
                                    <a href="customer_login" class="btn btn-success w-100">Login</a>
                              </div>
                         </div>
                </form>
        </div>
    </div>
</div>
