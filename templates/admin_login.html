{% include "head.html" %}



<div class="container-fluid login">
    <div class="row">
       <div class="col-md-4"></div>
        <div class="col-md-4"></div>
        <div class="col-md-4 mt-5">
            <div class="card mt-3 p-4">
                <div class="text-center h4">Admin Login</div>
                    <form action="admin_login1" method="post">
                      <div class="mt-1">
                        <label for ="username">User Name</label>
                        <input type="text" name="username" id="username" placeholder="Enter Name" class="form-control">
                      </div>
                      <div class="mt-2">
                        <label for ="password">Password</label>
                        <input type="password" name="password" id="password"  placeholder="Enter Password" class="form-control">
                      </div>
                      <div class="mt-3">
                        <input type="submit" id="submit" value="Login" class="btn btn-primary w-100">
                      </div>
                        <div class="mt-2" style="color:red">
                             {% if message != None :%}
                                {{message}}
                             {% endif %}
                          </div>
                    </form>
            </div>
        </div>
    </div>
</div>
